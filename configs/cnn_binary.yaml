# Binary fall CNN: same 2D log-spectrogram input as 6-class CNN; 2-class head.
spectrogram:
  range_bin_mode: band
  fixed_range_bin: 32
  range_band: [28, 36]
  fixed_num_chirps: 5000
  stft_nperseg: 128
  stft_noverlap: 96
  stft_window: hann
  spec_height: 128
  spec_width: 128
  log_eps: 1.0e-6

training:
  split_fractions: [0.8, 0.1, 0.1]
  cnn_base: 48
  weight_decay: 0.0001
  use_head_bn: false
  fall_loss_multiplier: 2.0
