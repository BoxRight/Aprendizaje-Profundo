# Fixed preprocessing P — do not change mid-experiment without documenting.
spectrogram:
  range_bin_mode: fixed  # fixed | band | max_energy (max_energy = ablation only)
  fixed_range_bin: 32
  range_band: [28, 36]
  fixed_num_chirps: 5000
  stft_nperseg: 128 #numero de muestras por segmento
  stft_noverlap: 96 #solapamiento entre segmentos
  stft_window: hann #ventana de STFT
  spec_height: 128 #altura de la espectrograma
  spec_width: 128 #ancho de la espectrograma
  log_eps: 1.0e-6 #epsilon para evitar logaritmo de 0

training:
  split_fractions: [0.8, 0.1, 0.1]
  cnn_base: 48
  weight_decay: 0.0001
  # Optional BatchNorm on the GAP vector before the classifier (conv stack already uses BatchNorm2d).
  use_head_bn: false
