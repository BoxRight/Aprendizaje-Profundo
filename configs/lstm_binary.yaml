# Binary LSTM baseline on spectrogram-frame sequences.
spectrogram:
  range_bin_mode: band
  fixed_range_bin: 32
  range_band: [28, 36]
  fixed_num_chirps: 5000
  stft_nperseg: 128
  stft_noverlap: 96
  stft_window: hann
  spec_height: 128
  spec_width: 128
  log_eps: 1.0e-6

sequence:
  # Build T steps by slicing spectrogram width into T chunks.
  seq_len: 16
  frame_reduce: mean  # mean | max

lstm:
  hidden_size: 128
  num_layers: 1
  dropout: 0.0
  bidirectional: false

training:
  split_fractions: [0.8, 0.1, 0.1]
  weight_decay: 0.0001
  # Multiply the fall class CE weight (class=1 in binary setup).
  fall_loss_multiplier: 2.0
